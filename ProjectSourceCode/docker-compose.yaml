services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-e-vil-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PORT: 3000
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm start"

  db:
    image: postgres:16-alpine
    container_name: web-e-vil-db
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data: